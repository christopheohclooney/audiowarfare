<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audio Warfare Studios</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=VT323&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- BOOT SCREEN (module 2) -->
  <div id="boot-screen" class="boot-screen" aria-hidden="true">
    <div id="boot-lines" class="boot-lines"></div>
    <button id="boot-skip" class="boot-skip" hidden>SKIP</button>
  </div>

  <!-- DESKTOP -->
  <div id="desktop" class="desktop" aria-label="Audio Warfare Studios desktop">

    <!-- BACKGROUND -->
    <div class="desktop-bg" aria-hidden="true">
      <div class="desktop-grain"></div>
    </div>

    <!-- WINDOWS -->

    <div id="window-records" class="window" role="dialog" aria-label="Records" data-window="records" data-offset-x="60" data-offset-y="60">
      <div class="window-titlebar">
        <span class="window-title">RECORDS</span>
        <button class="window-close" data-close="records" aria-label="Close Records">✕</button>
      </div>
      <div class="window-body">
        <!-- content: module 5 -->
      </div>
    </div>

    <div id="window-about" class="window" role="dialog" aria-label="About" data-window="about" data-offset-x="90" data-offset-y="90">
      <div class="window-titlebar">
        <span class="window-title">ABOUT</span>
        <button class="window-close" data-close="about" aria-label="Close About">✕</button>
      </div>
      <div class="window-body">
        <!-- content: module 5 -->
      </div>
    </div>

    <div id="window-services" class="window" role="dialog" aria-label="Services" data-window="services" data-offset-x="120" data-offset-y="120">
      <div class="window-titlebar">
        <span class="window-title">SERVICES</span>
        <button class="window-close" data-close="services" aria-label="Close Services">✕</button>
      </div>
      <div class="window-body">
        <!-- content: module 5 -->
      </div>
    </div>

    <div id="window-contact" class="window" role="dialog" aria-label="Contact" data-window="contact" data-offset-x="150" data-offset-y="150">
      <div class="window-titlebar">
        <span class="window-title">CONTACT</span>
        <button class="window-close" data-close="contact" aria-label="Close Contact">✕</button>
      </div>
      <div class="window-body">
        <!-- content: module 5 -->
      </div>
    </div>

    <!-- TASKBAR -->
    <nav class="taskbar" role="navigation" aria-label="Taskbar">
      <div class="taskbar-left">
        <div class="taskbar-logo" aria-hidden="true">AW</div>
      </div>
      <div class="taskbar-center">
        <button class="taskbar-btn" data-open="records" aria-label="Open Records">
          <span class="taskbar-icon" aria-hidden="true">◈</span>
          <span class="taskbar-label">RECORDS</span>
          <span class="taskbar-indicator" aria-hidden="true"></span>
        </button>
        <button class="taskbar-btn" data-open="about" aria-label="Open About">
          <span class="taskbar-icon" aria-hidden="true">▸</span>
          <span class="taskbar-label">ABOUT</span>
          <span class="taskbar-indicator" aria-hidden="true"></span>
        </button>
        <button class="taskbar-btn" data-open="services" aria-label="Open Services">
          <span class="taskbar-icon" aria-hidden="true">⌖</span>
          <span class="taskbar-label">SERVICES</span>
          <span class="taskbar-indicator" aria-hidden="true"></span>
        </button>
        <button class="taskbar-btn" data-open="contact" aria-label="Open Contact">
          <span class="taskbar-icon" aria-hidden="true">◎</span>
          <span class="taskbar-label">CONTACT</span>
          <span class="taskbar-indicator" aria-hidden="true"></span>
        </button>
      </div>
      <div class="taskbar-right">
        <span id="taskbar-clock" class="taskbar-clock" aria-live="polite"></span>
      </div>
    </nav>

  </div><!-- /desktop -->

  <script src="boot.js"></script>
  <script src="windows.js"></script>
  <script src="main.js"></script>
</body>
</html>
